version: "3.9"

services:
  # ─────────────────── Infrastructure ───────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finsight_secret}
      POSTGRES_DB: ${POSTGRES_DB:-finsight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finsight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-net

  redis:
    image: redis:7-alpine
    container_name: finsight-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finsight-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: finsight-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - finsight-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finsight-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - finsight-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finsight-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: finsight
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8090:8080"
    networks:
      - finsight-net

  # ─────────────────── MLflow ───────────────────
  mlflow:
    build:
      context: .
      dockerfile: docker/Dockerfile.mlflow
    container_name: finsight-mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_secret}@postgres:5432/${POSTGRES_DB:-finsight}
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    networks:
      - finsight-net

  # ─────────────────── ML Training ───────────────────
  ml-trainer:
    build:
      context: .
      dockerfile: docker/Dockerfile.ml
    container_name: finsight-ml-trainer
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_secret}@postgres:5432/${POSTGRES_DB:-finsight}
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ml_models:/app/models
    command: python -m ml.pipeline
    networks:
      - finsight-net
    profiles:
      - training

  # ─────────────────── FastAPI ───────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: finsight-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-changeme-super-secret-key-32chars}
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_secret}@postgres:5432/${POSTGRES_DB:-finsight}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ml_models:/app/models:ro
      - ./artifacts:/app/artifacts:ro
      - ./configs:/app/configs:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - finsight-net

  # ─────────────────── Kafka Consumer ───────────────────
  consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.consumer
    container_name: finsight-consumer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://${POSTGRES_USER:-finsight}:${POSTGRES_PASSWORD:-finsight_secret}@postgres:5432/${POSTGRES_DB:-finsight}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MODEL_PATH=/app/models
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - ml_models:/app/models:ro
      - ./configs:/app/configs:ro
    networks:
      - finsight-net

  # ─────────────────── Kafka Producer (Simulator) ───────────────────
  producer:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    container_name: finsight-producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TRANSACTION_RATE=${TRANSACTION_RATE:-10}
    networks:
      - finsight-net
    profiles:
      - simulator

  # ─────────────────── Monitoring ───────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: finsight-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "9090:9090"
    networks:
      - finsight-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: finsight-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    networks:
      - finsight-net

  # ─────────────────── Nginx ───────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: finsight-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - finsight-net

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  mlflow_artifacts:
  ml_models:
  prometheus_data:
  grafana_data:

networks:
  finsight-net:
    driver: bridge
